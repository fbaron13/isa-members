<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISA Members Directory</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f8f9fa;
            color: #1a1a1a;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #1a1a1a;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }
        
        .search-box {
            margin-bottom: 30px;
        }
        
        .search-box input {
            width: 100%;
            max-width: 500px;
            padding: 14px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
        }
        
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat {
            background: white;
            padding: 20px 30px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: #2d5016;
        }
        
        .stat-label {
            color: #666;
            font-size: 0.9rem;
        }
        
        .table-container {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        thead {
            background: #2d5016;
            color: white;
        }
        
        th {
            padding: 16px;
            text-align: left;
            font-weight: 600;
            font-size: 0.9rem;
        }
        
        td {
            padding: 16px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        tr:hover {
            background: #f8f9fa;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f0f0f0;
            border-top-color: #2d5016;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Mitgliederverzeichnis</h1>
        <p class="subtitle">ISA Germany</p>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-number" id="total">-</div>
                <div class="stat-label">Mitglieder</div>
            </div>
        </div>
        
        <div class="search-box">
            <input type="text" id="search" placeholder="Suchen..." oninput="filterTable()">
        </div>
        
        <div id="loading" class="loading">
            <div class="loading-spinner"></div>
            <p>Laden...</p>
        </div>
        
        <div id="table-container" class="table-container" style="display: none;">
            <table>
                <thead>
                    <tr>
                        <th>Nr.</th>
                        <th>Name</th>
                        <th>Stadt</th>
                        <th>Email</th>
                        <th>Telefon</th>
                    </tr>
                </thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let members = [];

        async function loadMembers() {
            try {
                const res = await fetch('/.netlify/functions/members');
                members = await res.json();
                
                console.log('First member:', members[0]);
                
                document.getElementById('total').textContent = members.length;
                renderTable();
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('table-container').style.display = 'block';
            } catch (e) {
                alert('Fehler: ' + e.message);
            }
        }

        function renderTable() {
            const tbody = document.getElementById('tbody');
            const search = document.getElementById('search').value.toLowerCase();
            
            tbody.innerHTML = members
                .filter(m => {
                    const cd = m.contactDetailsData || {};
                    const str = JSON.stringify(cd).toLowerCase();
                    return str.includes(search);
                })
                .map(m => {
                    const cd = m.contactDetailsData || {};
                    const name = cd.companyName || [cd.firstName, cd.familyName].filter(Boolean).join(' ') || 'Unknown';
                    const city = cd.city || '-';
                    const email = m.emailOrUserName || cd.email || '-';
                    const phone = cd.phone || cd.privatePhone || cd.mobilePhone || '-';
                    
                    return `
                        <tr>
                            <td>${m.membershipNumber || m.id}</td>
                            <td><strong>${name}</strong></td>
                            <td>${city}</td>
                            <td>${email !== '-' ? '<a href="mailto:' + email + '">' + email + '</a>' : '-'}</td>
                            <td>${phone !== '-' ? '<a href="tel:' + phone + '">' + phone + '</a>' : '-'}</td>
                        </tr>
                    `;
                }).join('');
        }

        function filterTable() {
            renderTable();
        }

        loadMembers();
    </script>
</body>
</html>
