<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISA Germany - Mitgliederverzeichnis</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #fafafa;
            color: #1a1a1a;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* Controls */
        .controls {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .search-box {
            flex: 1;
            min-width: 280px;
            position: relative;
        }
        
        .search-box input {
            width: 100%;
            padding: 14px 48px 14px 20px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            background: white;
            transition: all 0.2s ease;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.05);
        }
        
        .search-icon {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 18px;
        }
        
        .filters {
            display: flex;
            gap: 8px;
        }
        
        .filter-btn {
            padding: 10px 20px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            background: white;
            color: #666;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.2s ease;
        }
        
        .filter-btn:hover {
            border-color: rgba(0, 0, 0, 0.2);
            background: rgba(0, 0, 0, 0.02);
        }
        
        .filter-btn.active {
            background: #1a1a1a;
            border-color: #1a1a1a;
            color: white;
        }
        
        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(0, 0, 0, 0.06);
            text-align: center;
        }
        
        .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: #1a1a1a;
            line-height: 1;
        }
        
        .stat-label {
            color: #666;
            font-size: 13px;
            margin-top: 8px;
            font-weight: 500;
        }
        
        /* Members Grid */
        .members-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        
        .member-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid rgba(0, 0, 0, 0.06);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        
        .member-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.08);
            border-color: rgba(0, 0, 0, 0.1);
        }
        
        .member-type-badge {
            position: absolute;
            top: 16px;
            right: 16px;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .member-type-badge.company {
            background: rgba(59, 130, 246, 0.1);
            color: #2563eb;
        }
        
        .member-type-badge.individual {
            background: rgba(34, 197, 94, 0.1);
            color: #16a34a;
        }
        
        .member-name {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 6px;
            line-height: 1.3;
            padding-right: 80px;
        }
        
        .member-city {
            color: #666;
            font-size: 14px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .member-contact {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .contact-link {
            color: #1a1a1a;
            text-decoration: none;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            transition: all 0.2s ease;
            opacity: 0.7;
        }
        
        .contact-link:hover {
            opacity: 1;
            transform: translateX(2px);
        }
        
        .contact-icon {
            opacity: 0.5;
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-top-color: #1a1a1a;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .hidden {
            display: none !important;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 20px 10px;
            }
            
            .controls {
                flex-direction: column;
            }
            
            .search-box {
                width: 100%;
            }
            
            .filters {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Stats -->
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="total-members">-</div>
                <div class="stat-label">Mitglieder</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="total-companies">-</div>
                <div class="stat-label">Firmen</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="total-individuals">-</div>
                <div class="stat-label">Einzelpersonen</div>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <div class="search-box">
                <input 
                    type="text" 
                    id="search-input" 
                    placeholder="Suche nach Name, Stadt..." 
                    oninput="filterMembers()"
                >
                <span class="search-icon">🔍</span>
            </div>
            
            <div class="filters">
                <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">
                    Alle
                </button>
                <button class="filter-btn" data-filter="company" onclick="setFilter('company')">
                    Firmen
                </button>
                <button class="filter-btn" data-filter="individual" onclick="setFilter('individual')">
                    Personen
                </button>
            </div>
        </div>

        <!-- Loading -->
        <div id="loading" class="loading">
            <div class="loading-spinner"></div>
            <p>Mitgliederdaten werden geladen...</p>
        </div>

        <!-- Members Grid -->
        <div id="members-grid" class="members-grid hidden"></div>
    </div>

    <script>
        // Using Netlify Function - reliable and secure!
        let allMembers = [];
        let currentFilter = 'all';

        // Load members from Netlify Function
        async function loadMembers() {
            try {
                console.log('Loading members from Netlify Function...');
                
                const response = await fetch('/.netlify/functions/members');

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                allMembers = processMembers(data);
                
                console.log('✅ Loaded', allMembers.length, 'members');
                
                updateStats();
                renderMembers();
                
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('members-grid').classList.remove('hidden');
                
            } catch (error) {
                console.error('Error loading members:', error);
                document.getElementById('loading').innerHTML = `
                    <p style="color: #ef4444;">⚠️ Fehler beim Laden der Daten</p>
                    <p style="font-size: 13px; margin-top: 8px;">${error.message}</p>
                    <p style="font-size: 12px; margin-top: 8px; color: #999;">
                        Prüfen Sie die Netlify Function Logs für Details.
                    </p>
                `;
            }
        }

        // Process members
        function processMembers(data) {
            const members = Array.isArray(data) ? data : (data.results || data.data || []);
            
            return members.map(member => {
                const hasCompanyName = !!(
                    member.companyName || 
                    member.company || 
                    member.contactDetails?.companyName
                );
                
                const type = hasCompanyName ? 'company' : 'individual';
                
                let name = '';
                if (hasCompanyName) {
                    name = member.companyName || 
                           member.company || 
                           member.contactDetails?.companyName || 
                           member.contactDetails?.name;
                } else {
                    name = member.contactDetails?.name || 
                           `${member.firstName || ''} ${member.familyName || ''}`.trim();
                }
                
                const city = member.contactDetails?.city || 
                            member.privateAddress?.city || 
                            member.city || '';
                
                return {
                    id: member.id,
                    name: name || 'Unbekannt',
                    city: city,
                    type: type,
                    email: member.contactDetails?.email || member.email || '',
                    phone: member.contactDetails?.phone || 
                          member.phone || 
                          member.privatePhone || '',
                    website: member.contactDetails?.website || member.website || ''
                };
            });
        }

        // Update stats
        function updateStats() {
            const companies = allMembers.filter(m => m.type === 'company').length;
            const individuals = allMembers.filter(m => m.type === 'individual').length;
            
            document.getElementById('total-members').textContent = allMembers.length;
            document.getElementById('total-companies').textContent = companies;
            document.getElementById('total-individuals').textContent = individuals;
        }

        // Render members
        function renderMembers() {
            const grid = document.getElementById('members-grid');
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            
            let filtered = allMembers.filter(member => {
                const matchesSearch = 
                    member.name.toLowerCase().includes(searchTerm) ||
                    member.city.toLowerCase().includes(searchTerm);
                
                const matchesFilter = 
                    currentFilter === 'all' || 
                    member.type === currentFilter;
                
                return matchesSearch && matchesFilter;
            });

            grid.innerHTML = filtered.map(member => `
                <div class="member-card ${member.type}">
                    <span class="member-type-badge ${member.type}">
                        ${member.type === 'company' ? 'Firma' : 'Person'}
                    </span>
                    <div class="member-name">${escapeHtml(member.name)}</div>
                    <div class="member-city">
                        <span style="opacity: 0.5;">📍</span>
                        ${escapeHtml(member.city)}
                    </div>
                    <div class="member-contact">
                        ${member.email ? `
                            <a href="mailto:${escapeHtml(member.email)}" class="contact-link">
                                <span class="contact-icon">✉️</span>
                                ${escapeHtml(member.email)}
                            </a>
                        ` : ''}
                        ${member.phone ? `
                            <a href="tel:${escapeHtml(member.phone)}" class="contact-link">
                                <span class="contact-icon">📞</span>
                                ${escapeHtml(member.phone)}
                            </a>
                        ` : ''}
                        ${member.website ? `
                            <a href="${escapeHtml(member.website)}" target="_blank" class="contact-link">
                                <span class="contact-icon">🌐</span>
                                Website
                            </a>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        // Filter members
        function filterMembers() {
            renderMembers();
        }

        // Set filter
        function setFilter(filter) {
            currentFilter = filter;
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.filter === filter) {
                    btn.classList.add('active');
                }
            });
            
            renderMembers();
        }

        // Escape HTML
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text ? text.replace(/[&<>"']/g, m => map[m]) : '';
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', loadMembers);
    </script>
</body>
</html>
